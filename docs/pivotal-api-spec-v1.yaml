openapi: 3.0.3 
info:
  title: Pivotal Connector API for Mojaloop - Developed by ThitsaWorks.
  description: |
    Specification for the Pivotal Connector API. This API is exposed by Pivotal to DFSP backends to simplify the process of sending and receiving funds within a Mojaloop scheme. **Note on terminology:** The term "Switch" is equal to the term "Hub", and the term "FSP" is equal to the term "DFSP".
  version: 1.0.0
servers:
- url: /
paths:
  /secured/sendmoney:
    post:
      tags:
      - sendmoney
      summary: Sends money from one account to another
      description: |
        The HTTP request `POST /secured/sendmoney` is used by the Payer DFSP to request the movement of funds from the Payer DFSP to the Payee DFSP. The underlying Mojaloop API has three stages for money transfer:
          1. Party lookup (discovery phase). This facilitates a check by the sending party that the destination party is correct before proceeding with a money movement.
          2. Quotation (agreement phase). This facilitates the exchange of fee information and the construction of a cryptographic "contract" between the Payee and Payer DFSPs before funds are transferred.
          3. Transfer (transfer phase). The enactment of the previously agreed "contract".
        This method has several modes of operation. - If the configuration variable `AUTO_ACCEPT_PARTY` is set to `"false"`, this method will terminate when the Payee party has been resolved and Payee party details have been returned.
          If the Payer wishes to proceed with the transfer, then a subsequent `PUT /secured/sendmoney/{transferId}` request (accepting the Payee party) is required to continue the operation.
          The Payment Manager will then proceed to the quotation stage.
        - If the configuration variable `AUTO_ACCEPT_QUOTES` is set to `"false"`, this method will terminate and return the quotation when it has been received from the Payee DFSP.
          If the Payee wishes to proceed with the transfer, then a subsequent `PUT /secured/sendmoney/{transferId}` request (accepting the quote) is required to continue the operation.
          The Payment Manager will then proceed to the transfer state.
        If the configuration variables `AUTO_ACCEPT_PARTY` and `AUTO_ACCEPT_QUOTES` are both set to `"true"`, this method will block until all three transfer stages are complete. Upon completion, it will return the entire set of transfer details received during the operation. Combinations of settings for `AUTO_ACCEPT...` configuration variables allow the Payment Manager user to decide which mode of operation best suits their use cases. i.e., the Payment Manager can be configured to "break" the three-stage transfer at these points in order to execute backend logic such as party verification, quoted fees assessments, etc.
      operationId: securedPostSendMoney
      parameters:
      - name: Authorization
        in: header
        description: "The `Authorization` header field is used by the API for securely transmitting information in a compact and self-contained manner as a JSON object. The field must be set with a JWT (JSON Web Token) generated using an RSA private key in PKCS#8 format, loaded from a specified file (e.g., private_key.pem), and signed with the RS256 algorithm. Using PKCS#8 format ensures that the private key is stored in a standardized and secure way. The JWT payload MUST be the request body itself (the connector verifies the signed payload against the received body). Once generated, the JWT (the token) should be included in the Authorization header as the raw token in the format `Authorization: <JWT>` — do not use a `Bearer` prefix — to enable secure, authenticated API requests."
        required: true
        schema:
          type: string
          description: Raw JWT, sent without a `Bearer` prefix
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      - name: fspiop-source
        in: header
        description: The payer DFSP identifier. For `POST /secured/sendmoney`, this must match `from.fspId` in the request body. For the follow-up `PUT /secured/sendmoney/{transferId}` requests, this must be the same payer DFSP ID used in the initial send money request.
        required: true
        schema:
          type: string
      requestBody:
        description: Transfer request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/postSendMoneyRequest'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/postSendMoneySuccess'
        "400":
          $ref: '#/components/responses/badRequest'
        "401":
          $ref: '#/components/responses/unauthorized'
        "403":
          $ref: '#/components/responses/forbidden'
        "500":
          $ref: '#/components/responses/postTransferServerError'
  /secured/sendmoney/{transferId} (Accept Party):
    put:
      tags:
      - sendmoney
      summary: Continues a transfer that has paused at the party lookup and/or quote stage in order to accept or reject Payee party and/or quote
      description: |
        The HTTP request `PUT /secured/sendmoney/{transferId}` is used by the Payer DFSP to continue a transfer initiated via the `POST /secured/sendmoney` method that has halted after party lookup and/or quotation stage. The request body should contain `acceptParty` property set to `true` as required to continue the transfer. See the description of the `PUT /secured/sendmoney` HTTP method for more information on modes of transfer.
      operationId: securedPutSendMoneyAcceptPartyByTransferId
      parameters:
      - name: transferId
        in: path
        description: Transfer identifier.
        required: true
        schema:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
          type: string
      - name: Authorization
        in: header
        description: "The `Authorization` header field is used by the API for securely transmitting information in a compact and self-contained manner as a JSON object. The field must be set with a JWT (JSON Web Token) generated using an RSA private key in PKCS#8 format, loaded from a specified file (e.g., private_key.pem), and signed with the RS256 algorithm. Using PKCS#8 format ensures that the private key is stored in a standardized and secure way. The payload must include the necessary claims required by the API. The secure JWT (JSON Web Token) generated from a private key and payload. Once generated, the JWT (the token) should be included in the Authorization header as the raw token in the format `Authorization: <JWT>` — do not use a `Bearer` prefix — to enable secure, authenticated API requests."
        required: true
        schema:
          type: string
          description: Raw JWT, sent without a `Bearer` prefix
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      - name: fspiop-source
        in: header
        description: The payer DFSP identifier. This must be the same `fspiop-source` value used in the initial `POST /secured/sendmoney` call and must match `from.fspId` from that request body.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptPartyRequest'
      responses:
        "200":
          $ref: '#/components/responses/acceptPartySuccess'
        "400":
          $ref: '#/components/responses/badRequest'
        "401":
          $ref: '#/components/responses/unauthorized'
        "403":
          $ref: '#/components/responses/forbidden'
        "500":
          $ref: '#/components/responses/putAcceptPartyTransferServerError'
  /secured/sendmoney/{transferId} (Accept Quote):
    put:
      tags:
      - sendmoney
      summary: Continues a transfer that has paused at the party lookup and/or quote stage in order to accept or reject Payee party and/or quote
      description: |
        The HTTP request `PUT /secured/sendmoney/{transferId}` is used by the Payer DFSP to continue a transfer initiated via the `POST /secured/sendmoney` method that has halted after party lookup and/or quotation stage. The request body should contain `acceptQuote` property set to `true` as required to continue the transfer. See the description of the `PUT /secured/sendmoney` HTTP method for more information on modes of transfer.
      operationId: securedPutSendMoneyAcceptQuoteByTransferId
      parameters:
      - name: transferId
        in: path
        description: Transfer identifier.
        required: true
        schema:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
          type: string
      - name: Authorization
        in: header
        description: "The `Authorization` header field is used by the API for securely transmitting information in a compact and self-contained manner as a JSON object. The field must be set with a JWT (JSON Web Token) generated using an RSA private key in PKCS#8 format, loaded from a specified file (e.g., private_key.pem), and signed with the RS256 algorithm. Using PKCS#8 format ensures that the private key is stored in a standardized and secure way. The payload must include the necessary claims required by the API. The secure JWT (JSON Web Token) generated from a private key and payload. Once generated, the JWT (the token) should be included in the Authorization header as the raw token in the format `Authorization: <JWT>` — do not use a `Bearer` prefix — to enable secure, authenticated API requests."
        required: true
        schema:
          type: string
          description: Raw JWT, sent without a `Bearer` prefix
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      - name: fspiop-source
        in: header
        description: The payer DFSP identifier. This must be the same `fspiop-source` value used in the initial `POST /secured/sendmoney` call and must match `from.fspId` from that request body.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/acceptQuoteRequest'
      responses:
        "200":
          $ref: '#/components/responses/acceptQuoteSuccess'
        "400":
          $ref: '#/components/responses/badRequest'
        "401":
          $ref: '#/components/responses/unauthorized'
        "403":
          $ref: '#/components/responses/forbidden'
        "500":
          $ref: '#/components/responses/putAcceptQuoteTransferServerError'
  /dfsp-list-with-prefixes:
    get:
      tags:
      - dfsps
      summary: Retrieves a complete list of registered Digital Financial Service Providers (DFSPs) on the Hub along with their dialing prefixes.
      description: |
          The `GET /dfsp-list-with-prefixes` endpoint retrieves a complete list of
          registered Digital Financial Service Providers (DFSPs) on the Hub,
          including their associated dialing prefixes. 
      responses:
        "200": 
          $ref: '#/components/responses/getDfspPrefixSuccess'
  /dfsp-list-with-prefixes-by-usecase/{usecase}:
    get:
      tags:
      - dfsps
      summary: Retrieves a filtered list of DFSPs based on a specific use case.
      description: |
          The `GET /dfsp-list-with-prefixes/{usecase}` endpoint retrieves a complete list of
          registered Digital Financial Service Providers (DFSPs) on the Hub,
          including their associated dialing prefixes based on a specific usecase.
      parameters:
      - name: usecase
        in: path
        description: specific usecase.
        required: true
        schema:
          type: string
          example: "PERSON_TO_PERSON"
      responses:
        "200": 
          $ref: '#/components/responses/getDfspPrefixSuccess'

components:
  schemas:
    amountType:
      type: string
      description: SEND for send amount. RECEIVE for receive amount.
      enum:
      - SEND
      - RECEIVE
    amount:
     type: string
     description: |
       Transfer amount as a canonical FSPIOP Amount string. No leading zeros and no sign; up to 18 integer digits and at most 4 decimal places, with no trailing zeros in the fractional part (e.g. `128`, `128.5`, `0.01`).
       The maximum number of decimal places actually accepted is deployment-specific and is governed by the scheme's `DECIMAL_PLACES` configuration. For example, Guinea is configured with `DECIMAL_PLACES=0` (whole numbers only, so `10.01` is rejected), while other deployments (e.g. Liberia) may set it to `2` or `4`. Trailing zeros are ignored (`128.00` is treated as `128`), and any amount with more decimal precision than the configured `DECIMAL_PLACES` is rejected with a rounding error.
     pattern: "^([0]|([1-9][0-9]{0,17}))([.][0-9]{0,3}[1-9])?$"
     example: "128"
    currency:
      maxLength: 3
      minLength: 3
      type: string
      enum:
      - AED
      - AFN
      - ALL
      - AMD
      - ANG
      - AOA
      - ARS
      - AUD
      - AWG
      - AZN
      - BAM
      - BBD
      - BDT
      - BGN
      - BHD
      - BIF
      - BMD
      - BND
      - BOB
      - BRL
      - BSD
      - BTN
      - BWP
      - BYN
      - BZD
      - CAD
      - CDF
      - CHF
      - CLP
      - CNY
      - COP
      - CRC
      - CUC
      - CUP
      - CVE
      - CZK
      - DJF
      - DKK
      - DOP
      - DZD
      - EGP
      - ERN
      - ETB
      - EUR
      - FJD
      - FKP
      - GBP
      - GEL
      - GGP
      - GHS
      - GIP
      - GMD
      - GNF
      - GTQ
      - GYD
      - HKD
      - HNL
      - HRK
      - HTG
      - HUF
      - IDR
      - ILS
      - IMP
      - INR
      - IQD
      - IRR
      - ISK
      - JEP
      - JMD
      - JOD
      - JPY
      - KES
      - KGS
      - KHR
      - KMF
      - KPW
      - KRW
      - KWD
      - KYD
      - KZT
      - LAK
      - LBP
      - LKR
      - LRD
      - LSL
      - LYD
      - MAD
      - MDL
      - MGA
      - MKD
      - MMK
      - MNT
      - MOP
      - MRO
      - MUR
      - MVR
      - MWK
      - MXN
      - MYR
      - MZN
      - NAD
      - NGN
      - NIO
      - NOK
      - NPR
      - NZD
      - OMR
      - PAB
      - PEN
      - PGK
      - PHP
      - PKR
      - PLN
      - PYG
      - QAR
      - RON
      - RSD
      - RUB
      - RWF
      - SAR
      - SBD
      - SCR
      - SDG
      - SEK
      - SGD
      - SHP
      - SLL
      - SOS
      - SPL
      - SRD
      - STD
      - SVC
      - SYP
      - SZL
      - THB
      - TJS
      - TMT
      - TND
      - TOP
      - TRY
      - TTD
      - TVD
      - TWD
      - TZS
      - UAH
      - UGX
      - USD
      - UYU
      - UZS
      - VEF
      - VND
      - VUV
      - WST
      - XAF
      - XCD
      - XDR
      - XOF
      - XPF
      - XTS
      - XXX
      - YER
      - ZAR
      - ZMW
      - ZWD
    dateOfBirth:
      pattern: "^(?:[1-9]\\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\\d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)$"
      type: string
      description: Date in the form YYYY-MM-DD.
    dfspList:
      type: object
      properties:
        id:
          type: integer
        prefix:
          type: integer
        fspId:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          type: string
        localeName:
          type: string
        dfspType:
          type: string
        additionalInfo:
          type: string
          nullable: true
        logoDataType:
          type: string
        logoBase64:
          type: string
          description: Base64-encoded logo image
        name:
          type: string

    errorResponse:
      type: object
      properties:
        statusCode:
          pattern: "^[1-9]\\d{2,3}$"
          type: string
          description: Error code as string.
        message:
          maxLength: 4096
          type: string
          description: Error message text.
        localeMessage:
          maxLength: 4096
          type: string
          description: Error message text.
        detailedDescription:
          maxLength: 10000
          type: string
          description: Error message text

    extensionItem:
      type: object
      properties:
        key:
          maxLength: 32
          minLength: 1
          type: string
        value:
          maxLength: 128
          minLength: 1
          type: string
    extensionList:

      type: array
      items:
        $ref: '#/components/schemas/extensionItem'

    fspId:
      maxLength: 32
      minLength: 1
      type: string
      description: FSP with which the party is associated.
    homeTransactionId:
      maxLength: 255
      type: string
      description: "Transaction ID from the DFSP backend, used to reconcile transactions between the Switch and the DFSP backend systems. In Mojaloop and Pivotal, this field is mandatory. However, most Core Banking Systems (CBS) generate the transaction ID only once the transaction stage is reached. Therefore, during the payer integration, the DFSP can provide a UUID in the initial call (e.g., KYC) and later override it with the actual transaction ID (homeTransactionId) in the subsequent transaction confirmation call."
    idSubValue:
      maxLength: 128
      minLength: 1
      type: string
      description: "Either a sub-identifier of an `{idValue}`, or a sub-type of the `{idType}`, normally a `{personalIdType}`, for example a phone number associated with an account"
    idType:
      type: string
      description: |-
        Below are the allowed values for the enumeration.
        - MSISDN -  An MSISDN (Mobile Station International Subscriber Directory Number, that is, the phone number) is used as reference to a participant. The MSISDN identifier should be in international format according to the [ITU-T E.164 standard](https://www.itu.int/rec/T-REC-E.164/en). Optionally, the MSISDN may be prefixed by a single plus sign, indicating the international prefix.
        - EMAIL - An email is used as reference to a participant. The format of the email should be according to the informational RFC 3696.
        - PERSONAL_ID - A personal identifier is used as reference to a participant. Examples of personal identification are passport number, birth certificate number, and national registration number. The identifier number is added in the PartyIdentifier element. The personal identifier type is added in the PartySubIdOrType element.
        - BUSINESS A specific Business (for example, an organization or a company) is used as reference to a participant. The BUSINESS identifier can be in any format. To make a transaction connected to a specific username or bill number in a Business, the PartySubIdOrType element should be used.
        - DEVICE A specific device (for example, a POS or ATM) ID connected to a specific business or organization is used as reference to a Party. For referencing a specific device under a specific business or organization, use the PartySubIdOrType element.
        - ACCOUNT_ID - A bank account number or FSP account ID should be used as reference to a participant. The ACCOUNT_ID identifier can be in any format, as formats can greatly differ depending on country and FSP.
        - IBAN A bank account number or FSP account ID is used as reference to a participant. The IBAN identifier can consist of up to 34 alphanumeric characters and should be entered without whitespace.
        - ALIAS An alias is used as reference to a participant. The alias should be created in the FSP as an alternative reference to an account owner. Another example of an alias is a username in the FSP system. The ALIAS identifier can be in any format. It is also possible to use the PartySubIdOrType element for identifying an account under an Alias defined by the PartyIdentifier.
      enum:
      - MSISDN
      - EMAIL
      - PERSONAL_ID
      - BUSINESS
      - DEVICE
      - ACCOUNT_ID
      - IBAN
      - ALIAS
    idValue:
      maxLength: 125
      minLength: 4
      pattern: "^[A-Za-z0-9]{4,125}$"
      type: string
      description: Identifier of the party.
    merchantClassificationCode:
      pattern: "^[\\d]{1,4}$"
      type: string
      description: "Up to 4 digits specifying the sender's merchant classification, if known and applicable."


    partyName:
      maxLength: 128
      minLength: 1
      type: string
    type:
      type: string
      description: |
        Below are the allowed values for the enumeration - CONSUMER Consumer is the initiator of the transaction. Example - peer-to-peer transfer or loan repayment from wallet. - AGENT Agent is the initiator of the transaction. Example - loan repayment via an agent. - BUSINESS Business is the initiator of the transaction. Example - loan disbursement. - DEVICE Device is the initiator of the transaction. Example - merchant-initiated merchant payment authorized on POS.
      enum:
      - CONSUMER
      - AGENT
      - BUSINESS
      - DEVICE
  
    subScenario:
      pattern: "^[A-Z_]{1,32}$"
      type: string
      example: "PERSON_TO_PERSON"
      description: "The subScenario field is mandatory and is used to specify the detailed transaction use case for each transfer. It enables differentiation between various transaction flows such as P2P (Person to Person), G2P (Government to Person), B2B (Business to Business), etc. The value must match the regex pattern ^[A-Z_]{1,32}$ and must be one of the allowed values listed below.
 
Allowed values:

  - PERSON_TO_PERSON: Person to Person transfer

  - PERSON_TO_BUSINESS: Payments from individual to business (e.g., merchant payment)

  - BUSINESS_TO_BUSINESS: Payments between two businesses

  - BUSINESS_TO_GOVERNMENT: Business paying to government (e.g., tax, license fees)

  - PERSON_TO_GOVERNMENT: Citizen paying to government (e.g., utility, tax, fees)

  - GOVERNMENT_TO_PERSON: Government disbursement (pensions, salaries, social payments)

  - BUSINESS_TO_PERSON: Salary, refunds, or other business-to-person payments

  - CROSS_BORDER_REMITTANCE: International remittance between countries (inbound or outbound)"
      
    supportedCurrencies:
      type: array
      description: A list of supported currency codes
      items:
        type: string
    initiatedTimestamp:
      pattern: "^(?:[1-9]\\d{3}-(?:(?:0[1-9]|1[0-2])-(?:0[1-9]|1\\d|2[0-8])|(?:0[13-9]|1[0-2])-(?:29|30)|(?:0[13578]|1[02])-31)|(?:[1-9]\\d(?:0[48]|[2468][048]|[13579][26])|(?:[2468][048]|[13579][26])00)-02-29)T(?:[01]\\d|2[0-3]):[0-5]\\d:[0-5]\\d(?:(\\.\\d{3}))(?:Z|[+-][01]\\d:[0-5]\\d)$"
      type: string
      description: An ISO-8601 formatted timestamp.

    TransactionScenario:

      type: string
      description: |
        Below are the allowed values for the enumeration.
        - DEPOSIT - Used for cash-in / deposit transactions.
        - WITHDRAWAL - Used for cash-out / withdrawal transactions.
        - TRANSFER - Used for performing a P2P (Peer to Peer, or Consumer to Consumer) transaction.
        - PAYMENT - Used for merchant or bill payment transactions.
        - REFUND - Used for refund transactions.
      example: TRANSFER
      enum:
      - DEPOSIT
      - WITHDRAWAL
      - TRANSFER
      - PAYMENT
      - REFUND
    AcceptPartyRequest:
      required:
      - acceptParty
      - amount
      type: object
      properties:
        acceptParty:
          type: boolean
          enum:
          - true
          - false
        amount:
          oneOf:
          - $ref: '#/components/schemas/amount'
          - type: number
          description: |
            Confirmed transfer amount, accepted as either a JSON string (canonical FSPIOP Amount, e.g. `"10"`) or a JSON number (e.g. `10`). The number of decimal places permitted is governed by the scheme's `DECIMAL_PLACES` configuration (see the `amount` schema) — for example, with Guinea's `DECIMAL_PLACES=0`, `"10"` and `10` are accepted but `"10.01"` is rejected.
          example: "10"
        extensionList:
          $ref: '#/components/schemas/extensionList'
    acceptQuoteRequest:
      required:
      - acceptQuote
      type: object
      properties:
        acceptQuote:
          type: boolean
          enum:
          - true
          - false
        extensionList:
          $ref: '#/components/schemas/extensionList'
    transferId:

      type: string
      description: A Mojaloop API transfer identifier (ULID).
    FspParty:
      required:
      - idType
      - idValue
      - fspId
      type: object
      properties:
        type:
          $ref: '#/components/schemas/type'
        idType:
          $ref: '#/components/schemas/idType'
        idValue:
          $ref: '#/components/schemas/idValue'
        idSubValue:
          $ref: '#/components/schemas/idSubValue'
        displayName:
          $ref: '#/components/schemas/partyName'
        firstName:
          $ref: '#/components/schemas/partyName'
        middleName:
          $ref: '#/components/schemas/partyName'
        lastName:
          $ref: '#/components/schemas/partyName'
        dateOfBirth:
          $ref: '#/components/schemas/dateOfBirth'
        merchantClassificationCode:
          $ref: '#/components/schemas/merchantClassificationCode'
        fspId:
          $ref: '#/components/schemas/fspId'
        extensionList:
          $ref: '#/components/schemas/extensionList'
    postSendMoneyRequest:
      required:
      - amount
      - amountType
      - currency
      - from
      - homeTransactionId
      - to
      - transactionType
      - subScenario
      type: object
      properties:
        homeTransactionId:
          $ref: '#/components/schemas/homeTransactionId'
        from:
          $ref: '#/components/schemas/FspParty'
        to:
          $ref: '#/components/schemas/FspParty'
        amountType:
          $ref: '#/components/schemas/amountType'
        currency:
          $ref: '#/components/schemas/currency'
        amount:
         $ref: '#/components/schemas/amount'
        transactionType:
          $ref: '#/components/schemas/TransactionScenario'
        subScenario:
          $ref: '#/components/schemas/subScenario'

        note:
          maxLength: 128
          type: string
    getDfspPrefixResponse:
      type: array
      items:
        $ref: '#/components/schemas/dfspList'

    postSendMoneyResponse:
      type: object
      properties:
        transferId:
          $ref: '#/components/schemas/transferId'
        homeTransactionId:
          $ref: '#/components/schemas/homeTransactionId'
        from:
          $ref: '#/components/schemas/FspParty'
        to:
          $ref: '#/components/schemas/FspParty'
        amountType:
          $ref: '#/components/schemas/amountType'
        transactionType:
          $ref: '#/components/schemas/TransactionScenario'
        note:
          maxLength: 128
          type: string
        amount:
