  responses:

    badRequest:
      description: The request was invalid or was missing a mandatory element.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "3100"
            message: Generic validation error.
            localeMessage: Generic validation error.
            detailedDescription: "fspiop-source header or request.from.fspId is required."
    unauthorized:
      description: Authentication failed - the `Authorization` JWT is missing, malformed, or its signature/payload does not verify against the request body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "3100"
            message: Authentication error.
            localeMessage: Authentication error.
            detailedDescription: "Authorization signature verification failed."
    forbidden:
      description: The caller is not authorized to act for the specified payer FSP.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "3101"
            message: Permission error.
            localeMessage: Permission error.
            detailedDescription: "fspiop-source is not authorized to act for the payer FSP."
    postSendMoneySuccess:
      description: Transfer completed successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/postSendMoneyResponse'
    acceptPartySuccess:
      description: Transfer completed successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/acceptPartyResponse'
            
    acceptQuoteSuccess:
      description: Transfer completed successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/acceptQuoteResponse' 
    getDfspPrefixSuccess:
      description: Dfps prefix list retrieved successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getDfspPrefixResponse'

    postTransferServerError:
      description: An error occurred processing the transfer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "3204"
            message: Payment is not successful. Please contact your service provider.
            localeMessage: Payment is not successful. Please contact your service provider.
            detailedDescription: |
              Got an error response resolving party: {
                errorInformation: {
                  errorCode: '3204',
                  errorDescription: 'Payment is not successful. Please contact your service provider.'
                }
              }
    putAcceptPartyTransferServerError:
      description: An error occurred processing the transfer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "3100"
            message: "Please try again later. If you still cannot do the payment, please contact your service provider."
            localeMessage: "Please try again later. If you still cannot do the payment, please contact your service provider."
            detailedDescription: "Got an error response requesting fxQuote: {\"errorInformation\":{\"errorCode\":\"3100\",\"errorDescription\":\"Generic validation error - Unsupported participant 'fxp'\"}}"
    putAcceptQuoteTransferServerError:
      description: An error occurred processing the transfer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "4001"
            message: Your service provider is not available for this service now. Please contact your service provider.
            localeMessage: Your service provider is not available for this service now. Please contact your service provider.
            detailedDescription: "Got an error response preparing transfer: {\n  errorInformation: { \n    errorCode: '4001', \n    errorDescription: 'Payer FSP insufficient liquidity' \n  }\n}\n"
  
    transferTimeout:
      description: An error occurred processing the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
          example:
            statusCode: "5000"
            message: "Please try again later. If you still cannot make the payment, please contact your service provider."
            localeMessage: "Please try again later. If you still cannot make the payment, please contact your service provider."
            detailedDescription: must NOT have fewer than 1 characters
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      description: "The `Authorization` header field is used by the API for securely transmitting information in a compact and self-contained manner as a JSON object. The field must be set with a JWT (JSON Web Token) generated using an RSA private key in PKCS#8 format, loaded from a specified file (e.g., private_key.pem), and signed with the RS256 algorithm. Using PKCS#8 format ensures that the private key is stored in a standardized and secure way. The payload must include the necessary claims required by the API. The secure JWT (JSON Web Token) generated from a private key and payload. Once generated, the JWT (the token) should be included in the Authorization header as the raw token in the format `Authorization: <JWT>` — do not use a `Bearer` prefix — to enable secure, authenticated API requests."
      required: true
      schema:
        type: string
        description: Bearer token for authorization
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    idValue:
      name: idValue
      in: path
      description: Identifier of the party.
      required: true
      schema:
        maxLength: 128
        minLength: 1
        type: string
    idSubValue:
      name: idSubValue
      in: path
      description: Sub identifier of the party.
      required: true
      schema:
        maxLength: 128
        minLength: 1
        type: string
    transferId:
      name: transferId
      in: path
      description: Transfer identifier.
      required: true
      schema:
        pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
        type: string
