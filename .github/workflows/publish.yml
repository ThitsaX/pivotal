name: Publish images

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: web-outbound
            dockerfile: docker/web-outbound.Dockerfile
          - name: web-inbound
            dockerfile: docker/web-inbound.Dockerfile
          - name: app-auditor
            dockerfile: docker/app-auditor.Dockerfile
          - name: web-pivotal
            dockerfile: docker/web-pivotal.Dockerfile
          - name: portal
            dockerfile: docker/portal.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pivotal-${{ matrix.service.name }}
          flavor: |
            latest=auto
          tags: |
            type=match,pattern=v(\d+\.\d+\.\d+),group=1
            type=match,pattern=v(\d+\.\d+)\.\d+,group=1
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Image digest
        run: echo "${{ matrix.service.name }} → ${{ steps.docker_build.outputs.digest }}"
